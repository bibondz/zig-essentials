name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0

      - name: test uuid
        working-directory: uuid
        run: zig build test --summary all
